<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link class="favicon" rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JsFuncSheet — JavaScript Function-backed Spreadsheets</title>
  </head>
  <body>
    <div id="app">
      <button id="add-input-btn" class="btn btn-primary" aria-label="Add Variable" data-tooltip="Add Variable">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
      </button>

      <div id="inputs-container" class="inputs-container">
        <!-- Dynamic cards here -->
      </div>

      <footer class="board-tabs-footer">
        <div id="boards-list" class="boards-list"></div>
        <button id="add-board-btn" class="btn btn-add-board" data-tooltip="Create New Board">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>
        <button id="toggle-lines-btn" class="btn btn-add-board" data-tooltip="Toggle Connection Lines">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        </button>
      </footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
